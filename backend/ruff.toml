line-length = 100
target-version = "py311"
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  ".pytest_cache",
  "*.egg-info",
]

[lint]
select = [
  "E",      # pycodestyle errors
  "W",      # pycodestyle warnings
  "F",      # Pyflakes
  "I",      # isort
  "UP",     # pyupgrade
  "B",      # flake8-bugbear
]
ignore = [
  "E501",   # line too long (handled by formatter)
]

[lint.isort]
known-first-party = ["app"]
