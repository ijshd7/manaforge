services:
  backend:
    build:
      context: ./backend
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: development
    command: pnpm dev --host 0.0.0.0
    ports:
      - "5174:5173"  # 5174 avoids conflict with base 5173:80 (Compose merges port arrays)
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://backend:8000
