server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # Music melody conditioning uploads a base64 reference clip in the JSON
        # body (browser-capped at 10MB → ~13.3MB base64). Raise nginx's 1MB default
        # above the backend's 15M-char field limit so oversized payloads get a
        # parseable 422 from FastAPI rather than a bare nginx 413.
        client_max_body_size 16M;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Required for SSE — disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
