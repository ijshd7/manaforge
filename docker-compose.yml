services:
  pocketbase:
    build:
      context: ./pocketbase
    ports:
      - "8090:8090"
    volumes:
      - ./pocketbase/pb_data:/pb/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations
    env_file:
      - .env
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - pocketbase
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
